
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHOTOBOOTH ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --dark: #1a1410;
    --red: #d4341c;
    --gold: #c9a84c;
    --film: #2a2420;
    --strip: #f0ebe0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .page-content {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 900px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    color: var(--cream);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .logo span {
    color: var(--gold);
  }

  .subtitle {
    font-size: 1.4rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.45);
    margin-top: 10px;
  }

  /* ── MAIN LAYOUT ── */
  .booth-layout {
    display: grid;
    grid-template-columns: 1fr 260px;
    gap: 32px;
    align-items: start;
  }

  /* ── LIVE FEED ── */
  .live-section {
    position: relative;
  }

  .live-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  .camera-frame {
    position: relative;
    background: #000;
    border: 2px solid rgba(201,168,76,0.3);
    overflow: hidden;
    aspect-ratio: 4/3;
  }

  .camera-frame::before,
  .camera-frame::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold);
    border-style: solid;
    z-index: 10;
  }

  .camera-frame::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .camera-frame::after  { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  #webcam {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

  .flash-overlay {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.05s;
  }

  /* ── STICKER OVERLAY ──
     Edit the values below to position/size each sticker on the photo.
     Values are percentages of the camera frame (so they scale correctly
     into the captured image). One rule per shot — frame_1 → shot 1, etc.
  */
  .sticker-overlay {
    position: absolute;
    pointer-events: none;
    z-index: 5;
    display: none;
    /* default — overridden per shot below */
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
  }

  /* === Sticker 1 (frame_1.png) === */
  .sticker-overlay[data-shot="0"] {
    left: 60%;
    top: 0%;
    width: 40%;
    height: 79%;
  }

  /* === Sticker 2 (frame_2.png) === */
  .sticker-overlay[data-shot="1"] {
    left: 0%;
    top: 0%;
    width: 60%;
    height: 60%;
  }

  /* === Sticker 3 (frame_3.png) === */
  .sticker-overlay[data-shot="2"] {
    left: 45%;
    top: 40%;
    width: 55%;
    height: 60%;
  }

  /* === Sticker 4 (frame_4.png) === */
  .sticker-overlay[data-shot="3"] {
    left: 0%;
    top: 40%;
    width: 60%;
    height: 60%;
  }

  .flash-overlay.flash {
    animation: flashAnim 0.4s ease-out forwards;
  }

  @keyframes flashAnim {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── TIMER OVERLAY ── */
  .timer-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 15;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .timer-overlay.visible { opacity: 1; }

  .timer-ring {
    position: relative;
    width: 110px;
    height: 110px;
  }

  .timer-ring svg {
    transform: rotate(-90deg);
  }

  .timer-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.15);
    stroke-width: 4;
  }

  .timer-ring-progress {
    fill: none;
    stroke: var(--gold);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 283;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.9s linear;
  }

  .timer-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 700;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
  }

  .shot-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-top: 12px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    background: rgba(0,0,0,0.5);
    padding: 4px 10px;
  }

  /* ── CONTROLS ── */
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    padding: 14px 28px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:hover::after { opacity: 1; }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--red);
    color: white;
  }

  .btn-secondary {
    background: transparent;
    color: var(--cream);
    border: 1px solid rgba(245,240,232,0.3);
  }

  .btn-download {
    background: var(--gold);
    color: var(--dark);
  }

  .btn-sticker {
    background: transparent;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.5);
  }

  .btn-sticker.active {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ── DURATION PICKER ── */
  .duration-picker {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .duration-label {
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
    margin-right: 4px;
  }

  .duration-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    background: transparent;
    color: rgba(245,240,232,0.6);
    border: 1px solid rgba(245,240,232,0.2);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .duration-btn:hover {
    border-color: rgba(201,168,76,0.5);
    color: var(--cream);
  }

  .duration-btn.active {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
  }

  .duration-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ── FILM STRIP (RIGHT) ── */
  .film-strip {
    background: var(--film);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 16px 12px;
    position: relative;
  }

  .film-strip::before,
  .film-strip::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 24px;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 6px,
      rgba(0,0,0,0.6) 6px, rgba(0,0,0,0.6) 14px
    );
  }

  .film-strip::before { top: 0; }
  .film-strip::after { bottom: 0; }

  .strip-header {
    text-align: center;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.35);
    margin: 10px 0 14px;
  }

  .frames-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 10px 0;
  }

  .frame-slot {
    aspect-ratio: 4/3;
    background: #111;
    border: 1px solid rgba(255,255,255,0.07);
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .frame-slot.active {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold), inset 0 0 20px rgba(201,168,76,0.08);
  }

  .frame-slot.captured {
    border-color: rgba(201,168,76,0.3);
  }

  .frame-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .frame-number {
    position: absolute;
    bottom: 5px;
    right: 7px;
    font-size: 0.5rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
    z-index: 2;
  }

  .frame-empty {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.1);
    font-size: 1.2rem;
  }

  .capture-flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
  }

  /* ── STATUS ── */
  .status-bar {
    margin-top: 12px;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: rgba(245,240,232,0.4);
    text-transform: uppercase;
  }

  /* ── PROGRESS DOTS ── */
  .progress-dots {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.3s;
  }

  .dot.done { background: var(--gold); }
  .dot.active { background: var(--red); animation: pulse 1s infinite; }

  /* ── HIDDEN CANVAS ── */
  #compositeCanvas { display: none; }

  @media (max-width: 680px) {
    .booth-layout {
      grid-template-columns: 1fr;
    }

    .film-strip {
      display: grid;
    }

    .frames-grid {
      flex-direction: row;
    }
  }
</style>
</head>
<body>

<div class="page-content">
  <header>
    <div class="logo">Youngseon's Photo<span>✦</span>Booth</div>
    <div class="subtitle">feat. Bambi and Toby</div>
  </header>

  <div class="booth-layout">
    <!-- Live Camera -->
    <div class="live-section">
      <div class="live-label">
        <span class="live-dot"></span>
        <span id="liveStatus">Camera ready</span>
      </div>

      <div class="camera-frame">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="timer-overlay" id="timerOverlay">
          <div class="timer-ring">
            <svg width="110" height="110" viewBox="0 0 110 110">
              <circle class="timer-ring-bg" cx="55" cy="55" r="45"/>
              <circle class="timer-ring-progress" id="timerRing" cx="55" cy="55" r="45"/>
            </svg>
            <div class="timer-number" id="timerNumber">10</div>
          </div>
          <div class="shot-label" id="shotLabel">Shot 1 of 4</div>
        </div>
        <div class="flash-overlay" id="flashOverlay"></div>
        <img class="sticker-overlay" id="stickerOverlay" alt="">
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="startBtn">▶ Start</button>
        <button class="btn btn-sticker" id="stickerBtn">✦ Sticker</button>
        <button class="btn btn-secondary" id="resetBtn" style="display:none">↺ Reset</button>
        <button class="btn btn-download" id="downloadBtn" style="display:none">↓ Download Strip</button>
      </div>

      <div class="duration-picker" id="durationPicker">
        <span class="duration-label">Timer</span>
        <button class="duration-btn" data-seconds="1">1s</button>
        <button class="duration-btn active" data-seconds="3">3s</button>
        <button class="duration-btn" data-seconds="5">5s</button>
      </div>

      <div class="progress-dots" id="progressDots">
        <div class="dot" data-i="0"></div>
        <div class="dot" data-i="1"></div>
        <div class="dot" data-i="2"></div>
        <div class="dot" data-i="3"></div>
      </div>

      <div class="status-bar" id="statusBar">Click START to begin your photo session</div>
    </div>

    <!-- Film Strip -->
    <div class="film-strip">
      <div class="strip-header">✦ Your Strip ✦</div>
      <div class="frames-grid" id="framesGrid">
        <div class="frame-slot" id="slot0">
          <div class="frame-empty">①</div>
          <div class="frame-number">01</div>
        </div>
        <div class="frame-slot" id="slot1">
          <div class="frame-empty">②</div>
          <div class="frame-number">02</div>
        </div>
        <div class="frame-slot" id="slot2">
          <div class="frame-empty">③</div>
          <div class="frame-number">03</div>
        </div>
        <div class="frame-slot" id="slot3">
          <div class="frame-empty">④</div>
          <div class="frame-number">04</div>
        </div>
      </div>
    </div>
  </div>
</div>

<canvas id="compositeCanvas"></canvas>

<script>
const webcam      = document.getElementById('webcam');
const startBtn    = document.getElementById('startBtn');
const resetBtn    = document.getElementById('resetBtn');
const downloadBtn = document.getElementById('downloadBtn');
const stickerBtn  = document.getElementById('stickerBtn');
const stickerOverlay = document.getElementById('stickerOverlay');
const timerOverlay= document.getElementById('timerOverlay');
const timerNumber = document.getElementById('timerNumber');
const timerRing   = document.getElementById('timerRing');
const shotLabel   = document.getElementById('shotLabel');
const flashOverlay= document.getElementById('flashOverlay');
const statusBar   = document.getElementById('statusBar');
const liveStatus  = document.getElementById('liveStatus');
const progressDots= document.querySelectorAll('.dot');

const TOTAL_FRAMES = 4;
let   COUNTDOWN    = 3;
const CIRCUMFERENCE = 2 * Math.PI * 45; // r=45

const durationPicker = document.getElementById('durationPicker');
const durationBtns   = durationPicker.querySelectorAll('.duration-btn');

let stream = null;
let capturedImages = [];
let currentShot = 0;
let shooting = false;
let timerInterval = null;
let stickersEnabled = false;

// ── Init webcam ──
async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    webcam.srcObject = stream;
    statusBar.textContent = 'Click START to begin your photo session';
  } catch (err) {
    statusBar.textContent = 'Camera access denied — please allow camera permissions';
    startBtn.disabled = true;
    liveStatus.textContent = 'No camera';
  }
}

initCamera();

// ── Timer duration picker ──
durationBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    if (shooting) return;
    COUNTDOWN = parseInt(btn.dataset.seconds, 10);
    durationBtns.forEach(b => b.classList.toggle('active', b === btn));
  });
});

function setDurationLocked(locked) {
  durationBtns.forEach(b => { b.disabled = locked; });
}

// ── Sticker toggle ──
stickerBtn.addEventListener('click', () => {
  if (shooting) return;
  stickersEnabled = !stickersEnabled;
  stickerBtn.classList.toggle('active', stickersEnabled);
  stickerBtn.textContent = stickersEnabled ? '✦ Sticker ON' : '✦ Sticker';
  updateStickerPreview();
});

function updateStickerPreview() {
  if (stickersEnabled && currentShot < TOTAL_FRAMES) {
    stickerOverlay.dataset.shot = currentShot;
    stickerOverlay.src = `stickers/frame_${currentShot + 1}.png`;
    stickerOverlay.style.display = 'block';
  } else {
    stickerOverlay.style.display = 'none';
  }
}

// ── Start sequence ──
startBtn.addEventListener('click', () => {
  if (shooting) return;
  shooting = true;
  setDurationLocked(true);
  startBtn.style.display = 'none';
  resetBtn.style.display = '';
  downloadBtn.style.display = 'none';
  capturedImages = [];
  currentShot = 0;
  clearFrames();
  progressDots.forEach(d => { d.classList.remove('done','active'); });
  shootNext();
});

function shootNext() {
  if (currentShot >= TOTAL_FRAMES) {
    finishSession();
    return;
  }

  // Mark active dot
  progressDots.forEach((d, i) => {
    d.classList.toggle('active', i === currentShot);
  });

  // Highlight active slot
  document.querySelectorAll('.frame-slot').forEach((s, i) => {
    s.classList.toggle('active', i === currentShot);
  });

  shotLabel.textContent = `Shot ${currentShot + 1} of ${TOTAL_FRAMES}`;
  liveStatus.textContent = `Shot ${currentShot + 1} of ${TOTAL_FRAMES} — get ready!`;
  updateStickerPreview();
  timerOverlay.classList.add('visible');

  let timeLeft = COUNTDOWN;
  updateTimer(timeLeft);

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer(timeLeft);
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      captureFrame();
    }
  }, 1000);
}

function updateTimer(t) {
  timerNumber.textContent = t;
  const progress = t / COUNTDOWN;
  const offset = CIRCUMFERENCE * (1 - progress);
  timerRing.style.strokeDashoffset = offset;

  if (t <= 3) {
    timerRing.style.stroke = '#d4341c';
  } else {
    timerRing.style.stroke = '#c9a84c';
  }

  statusBar.textContent = `Shot ${currentShot + 1} capturing in ${t}s…`;
}

function captureFrame() {
  // Trigger flash on live feed
  flashOverlay.classList.remove('flash');
  void flashOverlay.offsetWidth; // reflow
  flashOverlay.classList.add('flash');

  // Draw to hidden canvas
  const hiddenCanvas = document.createElement('canvas');
  hiddenCanvas.width  = webcam.videoWidth;
  hiddenCanvas.height = webcam.videoHeight;
  const ctx = hiddenCanvas.getContext('2d');
  ctx.save();
  ctx.translate(hiddenCanvas.width, 0);
  ctx.scale(-1, 1); // mirror to match display
  ctx.drawImage(webcam, 0, 0);
  ctx.restore();

  // Composite sticker on top, matching its on-screen position/size
  if (stickersEnabled && stickerOverlay.complete && stickerOverlay.naturalWidth > 0) {
    const frameRect   = document.querySelector('.camera-frame').getBoundingClientRect();
    const stickerRect = stickerOverlay.getBoundingClientRect();
    const sx = ((stickerRect.left - frameRect.left) / frameRect.width)  * hiddenCanvas.width;
    const sy = ((stickerRect.top  - frameRect.top)  / frameRect.height) * hiddenCanvas.height;
    const sw = (stickerRect.width  / frameRect.width)  * hiddenCanvas.width;
    const sh = (stickerRect.height / frameRect.height) * hiddenCanvas.height;
    ctx.drawImage(stickerOverlay, sx, sy, sw, sh);
  }

  const dataURL = hiddenCanvas.toDataURL('image/jpeg', 0.92);
  capturedImages.push(dataURL);

  // Show in strip
  const slot = document.getElementById(`slot${currentShot}`);
  slot.classList.remove('active');
  slot.classList.add('captured');
  slot.innerHTML = `<img src="${dataURL}" alt="Shot ${currentShot + 1}"><div class="frame-number">0${currentShot + 1}</div>`;

  // Flash the slot
  const cf = document.createElement('div');
  cf.className = 'capture-flash';
  slot.appendChild(cf);
  cf.style.opacity = '0.8';
  cf.style.transition = 'opacity 0.4s';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    cf.style.opacity = '0';
    setTimeout(() => cf.remove(), 400);
  }));

  // Mark dot done
  progressDots[currentShot].classList.remove('active');
  progressDots[currentShot].classList.add('done');

  timerOverlay.classList.remove('visible');
  currentShot++;

  if (currentShot < TOTAL_FRAMES) {
    liveStatus.textContent = 'Nice! Next shot coming…';
    statusBar.textContent = 'Great shot! Preparing next frame…';
    setTimeout(shootNext, 800);
  } else {
    finishSession();
  }
}

function finishSession() {
  shooting = false;
  setDurationLocked(false);
  timerOverlay.classList.remove('visible');
  stickerOverlay.style.display = 'none';
  document.querySelectorAll('.frame-slot').forEach(s => s.classList.remove('active'));
  liveStatus.textContent = 'Session complete!';
  statusBar.textContent = 'All 4 shots captured — download your strip below!';
  downloadBtn.style.display = '';
  buildComposite();
}

// ── Build 4-frame composite ──
function buildComposite() {
  const imgs = capturedImages.map(src => {
    return new Promise(res => {
      const img = new Image();
      img.onload = () => res(img);
      img.src = src;
    });
  });

  Promise.all(imgs).then(images => {
    const W  = images[0].naturalWidth;
    const H  = images[0].naturalHeight;
    const PAD    = 24;
    const MARGIN = 16;
    const HEADER = 70;
    const FOOTER = 50;

    const cw = PAD * 2 + W;
    const ch = PAD + HEADER + (H + MARGIN) * 4 - MARGIN + PAD + FOOTER;

    const canvas = document.getElementById('compositeCanvas');
    canvas.width  = cw;
    canvas.height = ch;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = '#2a2420';
    ctx.fillRect(0, 0, cw, ch);

    // Film holes (left & right edge)
    ctx.fillStyle = '#1a1410';
    for (let y = 20; y < ch - 20; y += 40) {
      ctx.beginPath(); ctx.roundRect(6, y, 12, 22, 3); ctx.fill();
      ctx.beginPath(); ctx.roundRect(cw - 18, y, 12, 22, 3); ctx.fill();
    }

    // Header text
    ctx.fillStyle = '#c9a84c';
    ctx.font = 'italic bold 28px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText("Youngseon's Photo✦Booth", cw / 2, PAD + 36);
    ctx.fillStyle = 'rgba(245,240,232,0.3)';
    ctx.font = '11px monospace';
    ctx.fillText(new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }), cw / 2, PAD + 56);

    // Draw 4 frames
    images.forEach((img, i) => {
      const y = PAD + HEADER + i * (H + MARGIN);
      // Frame border
      ctx.strokeStyle = 'rgba(201,168,76,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(PAD - 1, y - 1, W + 2, H + 2);
      // Image
      ctx.drawImage(img, PAD, y, W, H);
      // Frame number
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '10px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`0${i + 1}`, PAD + W - 6, y + H - 6);
    });

    // Footer
    ctx.fillStyle = 'rgba(245,240,232,0.2)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('✦  ✦  ✦  ✦', cw / 2, ch - PAD - 10);
  });
}

// ── Download ──
downloadBtn.addEventListener('click', () => {
  const canvas = document.getElementById('compositeCanvas');
  const a = document.createElement('a');
  a.download = `photobooth-${Date.now()}.jpg`;
  a.href = canvas.toDataURL('image/jpeg', 0.95);
  a.click();
});

// ── Reset ──
resetBtn.addEventListener('click', () => {
  if (timerInterval) clearInterval(timerInterval);
  shooting = false;
  setDurationLocked(false);
  currentShot = 0;
  capturedImages = [];
  timerOverlay.classList.remove('visible');
  startBtn.style.display = '';
  resetBtn.style.display = 'none';
  downloadBtn.style.display = 'none';
  clearFrames();
  progressDots.forEach(d => d.classList.remove('done','active'));
  updateStickerPreview();
  statusBar.textContent = 'Click START to begin your photo session';
  liveStatus.textContent = 'Camera ready';
});

function clearFrames() {
  [0,1,2,3].forEach(i => {
    const slot = document.getElementById(`slot${i}`);
    slot.className = 'frame-slot';
    slot.innerHTML = `<div class="frame-empty">${['①','②','③','④'][i]}</div><div class="frame-number">0${i+1}</div>`;
  });
}
</script>
